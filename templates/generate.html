<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор отмазок</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-size: 2rem;
            color: #3b82f6;
            margin-bottom: 10px;
            text-align: center;
        }

        .description {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .mode-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: center;
        }

        .mode-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #f8fafc;
        }

        .result-section {
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
            display: none;
        }

        .result-title {
            font-size: 1.1rem;
            color: #10b981;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .result-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #f1f5f9;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🤖 Нейро-Генератор</h2>
        <p class="description">Введите ситуацию, выберите режим и искусственный интеллект создаст отмазку за секунду</p>

        <form id="generatorForm">
            <div class="form-group">
                <label for="situation">Что случилось? (Ваша ситуация)</label>
                <input type="text" id="situation" required minlength="5" placeholder="Например: я опоздал на физику...">
            </div>

            <label>Режим генерации</label>
            <div class="mode-selector">
                <div class="mode-btn active" id="btnPlausible" onclick="setMode('plausible')">🛡️ Правдоподобный</div>
                <div class="mode-btn" id="btnAbsurd" onclick="setMode('absurd')">🤪 Абсурдный</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Сгенерировать отмазку</button>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="color: #94a3b8; margin-top: 10px; font-size: 0.9rem;">ИИ придумывает оправдание...</p>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-title">✨ Ответ искусственного интеллекта:</div>
            <div class="result-box" id="resultBox"></div>
        </div>

        <a href="/" class="back-link">← Вернуться на главную</a>
    </div>

    <script>
        let currentMode = 'plausible';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btnPlausible').classList.toggle('active', mode === 'plausible');
            document.getElementById('btnAbsurd').classList.toggle('active', mode === 'absurd');
        }

        const form = document.getElementById('generatorForm');
        const loader = document.getElementById('loader');
        const resultSection = document.getElementById('resultSection');
        const resultBox = document.getElementById('resultBox');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const situation = document.getElementById('situation').value.trim();
            if (situation.length < 5) return;

            submitBtn.disabled = true;
            loader.style.display = 'block';
            resultSection.style.display = 'none';

            const payload = {
                situation: situation,
                mode: currentMode
            };

            fetch('/api/generate-excuse', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                loader.style.display = 'none';
                submitBtn.disabled = false;
                if (data && data.excuse) {
                    resultBox.innerText = data.excuse;
                    resultSection.style.display = 'block';
                }
            })
            .catch(err => {
                loader.style.display = 'none';
                submitBtn.disabled = false;
                resultBox.innerText = "Упс! Ошибка соединения с ИИ. Попробуйте еще раз.";
                resultSection.style.display = 'block';
            });
        });
    </script>
</body>
</html>
